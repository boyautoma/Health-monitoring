{% extends "base.html" %}
{% block title %}Connexion Garmin{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4">
                    <span class="text-warning">&#9889;</span> AppCoach
                </h2>
                <p class="text-center text-muted mb-4">
                    Connecte-toi avec ton compte Garmin Connect
                </p>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Garmin</label>
                        <input type="email" class="form-control" id="email" name="email" required
                               placeholder="ton.email@example.com">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Mot de passe</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        Se connecter
                    </button>
                </form>

                <div class="mt-3 text-center">
                    <small class="text-muted">
                        Tes identifiants sont utilis&eacute;s uniquement pour te connecter &agrave; Garmin Connect.
                        Ils ne sont pas stock&eacute;s en clair.
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
