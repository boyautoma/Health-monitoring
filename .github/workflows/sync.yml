name: Sync Garmin Data

on:
  schedule:
    # 10h Paris (CEST UTC+2) = 08h UTC
    - cron: '0 8 * * *'
    # 21h Paris (CEST UTC+2) = 19h UTC
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. Try to restore tokens from cache (refreshed by previous runs)
      - name: Restore cached tokens
        id: cache-tokens
        uses: actions/cache/restore@v4
        with:
          path: .garmin_tokens
          key: garmin-tokens-dummy
          restore-keys: garmin-tokens-

      # 2. Fallback: restore from secrets if no cache hit
      - name: Restore tokens from secrets (fallback)
        if: steps.cache-tokens.outputs.cache-hit != 'true'
        env:
          GARMIN_OAUTH1: ${{ secrets.GARMIN_OAUTH1_TOKEN }}
          GARMIN_OAUTH2: ${{ secrets.GARMIN_OAUTH2_TOKEN }}
        run: |
          mkdir -p .garmin_tokens
          echo "$GARMIN_OAUTH1" | base64 -d > .garmin_tokens/oauth1_token.json
          echo "$GARMIN_OAUTH2" | base64 -d > .garmin_tokens/oauth2_token.json
          echo "Tokens restored from secrets ($(wc -c < .garmin_tokens/oauth1_token.json)b + $(wc -c < .garmin_tokens/oauth2_token.json)b)"

      - name: Verify tokens exist
        run: |
          if [ ! -f .garmin_tokens/oauth1_token.json ] || [ ! -f .garmin_tokens/oauth2_token.json ]; then
            echo "ERROR: No tokens available"
            exit 1
          fi
          echo "Tokens ready ($(wc -c < .garmin_tokens/oauth1_token.json)b + $(wc -c < .garmin_tokens/oauth2_token.json)b)"

      - name: Install dependencies
        run: pip install garminconnect==0.2.38 garth

      - name: Sync Garmin data
        id: sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python sync_garmin.py

      # 3. Cache refreshed tokens for next run (new key each time = always fresh)
      - name: Cache refreshed tokens
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .garmin_tokens
          key: garmin-tokens-${{ github.run_id }}

      - name: Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "sync: Garmin data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
