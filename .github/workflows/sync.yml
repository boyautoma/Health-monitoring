name: Sync Garmin Data

on:
  schedule:
    # 10h Paris (CEST UTC+2) = 08h UTC
    - cron: '0 8 * * *'
    # 21h Paris (CEST UTC+2) = 19h UTC
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore Garmin tokens from secrets
        env:
          GARMIN_OAUTH1: ${{ secrets.GARMIN_OAUTH1_TOKEN }}
          GARMIN_OAUTH2: ${{ secrets.GARMIN_OAUTH2_TOKEN }}
        run: |
          mkdir -p .garmin_tokens
          echo "$GARMIN_OAUTH1" | base64 -d > .garmin_tokens/oauth1_token.json
          echo "$GARMIN_OAUTH2" | base64 -d > .garmin_tokens/oauth2_token.json
          echo "Tokens restored ($(wc -c < .garmin_tokens/oauth1_token.json)b + $(wc -c < .garmin_tokens/oauth2_token.json)b)"

      - name: Install dependencies
        run: pip install garminconnect==0.2.38 garth

      - name: Sync Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python sync_garmin.py

      - name: Upload refreshed tokens as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garmin-tokens
          path: .garmin_tokens/
          retention-days: 1

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "sync: Garmin data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
