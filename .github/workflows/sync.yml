name: Sync Garmin Data

on:
  schedule:
    # 10h Paris (CEST UTC+2) = 08h UTC
    - cron: '0 8 * * *'
    # 21h Paris (CEST UTC+2) = 19h UTC
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Garmin tokens
        uses: actions/cache@v4
        with:
          path: .garmin_tokens
          key: garmin-tokens

      - name: Install dependencies
        run: pip install garminconnect==0.2.38

      - name: Sync Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python sync_garmin.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "sync: Garmin data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
